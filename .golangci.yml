version: "2"

run:
  timeout: 5m
  tests: true

linters:
  default: none
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - bodyclose
    - copyloopvar
    - errorlint
    - gosec
    - misspell
    # nilerr: disabled — the codebase intentionally returns (result, nil) when
    # errors are encoded in the result struct (tool.Result.IsError, CallResult.IsError).
    - noctx
    - prealloc
    - revive
    - unconvert
    - unparam
    - usestdlibvars
  settings:
    errcheck:
      check-type-assertions: false
      exclude-functions:
        - fmt.Fprintf
        - fmt.Fprintln
        - fmt.Fprint
        - (io.Closer).Close
        - (net.Listener).Close
        - (*net.TCPListener).Close
        - (*os.File).Close
        - os.Remove
        - os.MkdirAll
        - os.Setenv
        - os.Unsetenv
        - (*net/http.Response).Body.Close
        - (os.File).WriteString
    gosec:
      excludes:
        - G104  # errors unhandled — covered by errcheck
        - G304  # file path from variable — normal for CLI reading user files
        - G204  # subprocess from variable — normal for BashTool / MCP servers
        - G306  # file write permissions — we use explicit 0o600 / 0o700
        - G703  # error from file close in defer — handled via _ = pattern
        - G101  # credential variable name — false positives on token vars
        - G115  # integer conversion — overly strict
        - G404  # weak PRNG — intentional in buddy companion feature
        - G301  # directory permissions — 0o755 is intentional for shared session dirs
        - G302  # file mkdir permissions — we use 0o700 correctly
        - G307  # deferred file close — handled explicitly
        - G702  # SSRF via taint — CLI makes intentional HTTP requests to user-configured URLs
        - G704  # SSRF via taint — same
        - G117  # secret in marshaled struct — OAuth token serialization is intentional
        - G118  # goroutine uses background context — intentional for long-lived background workers
    staticcheck:
      checks:
        - "-ST1018"  # false positive for raw string literals — escape sequences not valid in backtick strings
    revive:
      rules:
        - name: var-naming
        - name: indent-error-flow
        - name: errorf
        - name: error-return
        - name: error-strings
        - name: receiver-naming
        - name: range-val-in-closure
        - name: time-naming
        - name: unexported-return
        - name: var-declaration

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
  exclude-rules:
    # websocket.Dial's second return is not a plain HTTP response body;
    # nhooyr.io/websocket manages its lifetime internally.
    - path: "internal/mcp/client_ws.go"
      linters: [bodyclose]
    # Test helpers — errcheck/noctx/bodyclose are intentionally relaxed in tests.
    - path: ".*_test\\.go"
      linters: [errcheck, noctx, bodyclose]
    # pkce_test De Morgan alternative is a style choice, not a correctness issue.
    - path: "internal/auth/pkce_test.go"
      linters: [staticcheck]
    # LSP tool methods keep (tool.Result, error) signature for interface consistency.
    - path: "internal/tools/lsp/lsp.go"
      linters: [unparam]
    # Agent executeTools keeps error return for future error propagation.
    - path: "internal/agent/loop.go"
      linters: [unparam]
    # TUI key handlers return (Model, tea.Cmd) for API consistency; Cmd can become non-nil later.
    - path: "internal/tui/model.go"
      linters: [unparam]
