version: "2"

run:
  timeout: 5m
  tests: true

linters:
  default: none
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - bodyclose
    - copyloopvar
    - errorlint
    - gosec
    - misspell
    - nilerr
    - noctx
    - prealloc
    - revive
    - unconvert
    - unparam
    - usestdlibvars
  settings:
    errcheck:
      check-type-assertions: true
    gosec:
      excludes:
        - G104
    revive:
      rules:
        - name: var-naming
        - name: indent-error-flow
        - name: errorf
        - name: error-return
        - name: error-strings
        - name: receiver-naming
        - name: range-val-in-closure
        - name: time-naming
        - name: unexported-return
        - name: var-declaration

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
