version: 2

project_name: conduit

builds:
  - main: ./cmd/conduit
    binary: conduit
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
      - -X main.AppVersion={{.Version}}
      - -X main.GitCommit={{.Commit}}
      - -X main.BuildTime={{.Date}}
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64

archives:
  - id: conduit
    format: tar.gz
    format_overrides:
      - goos: windows
        format: zip
    name_template: "conduit_{{ .Os }}_{{ .Arch }}"
    files:
      - LICENSE
      - LICENSE-APACHE
      - README.md

checksum:
  name_template: checksums.txt
  algorithm: sha256

changelog:
  use: github
  sort: asc
  groups:
    - title: Features
      regexp: "^feat"
      order: 0
    - title: Bug Fixes
      regexp: "^fix"
      order: 1
    - title: Performance
      regexp: "^perf"
      order: 2
    - title: Other
      order: 999
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "^chore:"
      - "Merge pull request"
      - "Merge branch"

release:
  github:
    owner: Icehunter
    name: conduit
  name_template: "{{.ProjectName}} {{.Tag}}"
  draft: false
  prerelease: auto
